###################
### KEYBINDINGS ###
###################

# Action keybindings
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$subMod = ALT

# Application bindings
bind = $mainMod, Return, exec, $terminal       # Open terminal
bind = $mainMod, Q, killactive,                # Close active window
bind = $mainMod $subMod, Q, exit,                # Exit Hyprland
bind = $mainMod, E, exec, $fileManager         # Open file manager
bind = $mainMod, V, togglefloating,            # Toggle floating mode
bind = $mainMod, b, exec, $browser             # Open browser
bind = $mainMod $subMod, b, exec, $bar
bind = $mainMod, D, exec, $menu                # Open application menu
bind = $mainMod, SPACE, exec, $menu            # Open application menu (alternate)

# System bindings
# bind = $mainMod, L, exec, hyprlock             # Lock screen (Conflict with vim-nav)
bind = $mainMod, Escape, exec, hyprlock        # Lock screen (Alternative)
bind = $mainMod, Backspace, exec, wlogout      # Power menu
bind = $mainMod $subMod, P, exec, hyprpicker -a  # Color picker
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # Clipboard history

# Reload config
bind = $mainMod $subMod, R, exec, hyprctl reload

# ... (rest of file)

# Resize Submap (Vim-style)
bind = $mainMod, R, submap, resize

submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , Escape, submap, reset
submap = reset

# Screenshot bindings
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy # Screenshot area to clipboard
bind = SHIFT, Print, exec, grim - | wl-copy          # Screenshot full screen to clipboard

# Layout and workspace management
bind = $mainMod, P, pseudo,                    # Dwindle: pseudo tiling
bind = $mainMod, M, layoutmsg, orientationcenter # Master: center orientation
bind = $mainMod $subMod, M, layoutmsg, orientationcycle center right left

# Move focus (Vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move window (Vim-style)
# bind = $mainMod ALT, h, movewindow, l
# bind = $mainMod ALT, j, movewindow, d
# bind = $mainMod ALT, k, movewindow, u
# bind = $mainMod ALT, l, movewindow, r
bind = $mainMod $subMod, h, movewindow, d
bind = $mainMod $subMod, j, movewindow, l
bind = $mainMod $subMod, k, movewindow, r
bind = $mainMod $subMod, l, movewindow, u

# Switch workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace (1-10)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


bind = $mainMod, w, submap, window

submap = window
# binde = , l, resizeactive, 10 0
# binde = , h, resizeactive, -10 0
binde = , j, workspace, +1   # Next workspace
binde = , k, workspace, -1    # Previous workspace
binde = , l, movetoworkspace, +1   # Next workspace
binde = , h, movetoworkspace, -1   # Next workspace
# binde = , k, resizeactive, 0 -10
# binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

# Workspace navigation (relative)
bind = $mainMod, BracketRight, workspace, +1   # Next workspace
bind = $mainMod, BracketLeft, workspace, -1    # Previous workspace
bind = $mainMod, Tab, workspace, previous      # Cycle to previous workspace

# Move active window to workspace (relative)
bind = $mainMod SHIFT, BracketRight, movetoworkspace, +1
bind = $mainMod SHIFT, BracketLeft, movetoworkspace, -1

# Window State
bind = $mainMod, F, fullscreen, 1              # Toggle maximize (monocle mode)
bind = $mainMod $subMod, F, fullscreen, 0        # Toggle true fullscreen
bind = $mainMod $subMod, P, pin                    # Pin window (sticky)

# Group (Tabbed) Mode
bind = $mainMod, G, togglegroup                # Toggle group (tab mode)
bind = $mainMod CTRL, h, changegroupactive, b  # Switch to previous tab
bind = $mainMod CTRL, l, changegroupactive, f  # Switch to next tab

# Special workspace (scratchpad)
bind = $mainMod $subMod, Return, togglespecialworkspace, scratchpad
bind = $mainMod, T, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT $subMod, Return, movetoworkspace, special:scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod $subMod, S, movetoworkspace, special:magic

# Workspace navigation (mouse scroll)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Window manipulation (mouse drag)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media and brightness keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Player controls (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
